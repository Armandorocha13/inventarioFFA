<!DOCTYPE html>
<html lang="pt-br" data-tema="claro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Inventário — FFA Infraestrutura</title>

  <!-- Fontes Premium e Ícones -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════════════════
       TELA 1 — LANDING: Logo centralizada + Seletores (visível inicialmente)
       ═══════════════════════════════════════════════════════════════════════ -->
  <div id="landingScreen" class="landing-screen">
    <div class="landing-content">

      <!-- Logo do Projeto -->
      <div class="landing-logo-wrap">
        <img src="./logo.png" alt="FFA Infraestrutura" class="landing-logo">
      </div>

      <h1 class="landing-title">Plataforma de Inventário</h1>
      <p class="landing-subtitle">FFA Infraestrutura — Selecione seu estado para continuar</p>

      <!-- Seletor de Estado -->
      <div class="landing-selectors">
        <div class="landing-form-group">
          <label for="uf"><i class="fas fa-map-marker-alt"></i> Estado (UF)</label>
          <select id="uf" class="form-control landing-select">
            <option value="">Selecione seu estado...</option>
            <option value="todos">Todas as bases</option>
          </select>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       TELA 2 — LOADING: Logo + barra de progresso animada
       ═══════════════════════════════════════════════════════════════════════ -->
  <div id="loadingScreen" class="loading-screen" style="display: none;">
    <div class="loading-content">
      <img src="./logo.png" alt="Carregando..." class="loading-logo">
      <div class="loading-bar-track">
        <div class="loading-bar-fill"></div>
      </div>
      <p class="loading-label">Sincronizando inventário...</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       TELA 3 — APP: Header sticky + Conteúdo (oculto inicialmente)
       ═══════════════════════════════════════════════════════════════════════ -->
  <div id="appScreen" style="display: none;">

    <!-- ── Header Sticky (header-1 style) ── -->
    <header id="mainHeader" class="app-header">
      <nav class="app-nav">

        <!-- Logo (FFA) -->
        <div class="app-logo-wrap hover:bg-accent rounded-md p-2 cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})" title="FFA Infraestrutura">
          <img src="./logo.png" alt="FFA" class="app-logo-img">
        </div>

        <!-- Links de Navegação (Contagem Ativa, Curva ABC, Painel de Monitoramento) -->
        <div class="app-nav-tabs hidden md:flex" id="tabsNav">
          <button class="app-tab active" data-tab="contagem">Contagem Ativa</button>
          <button class="app-tab" data-tab="curvaABC">Curva ABC</button>
          <button class="app-tab" data-tab="monitoramento">Painel de Monitoramento</button>
        </div>

        <!-- Ações do Header (Tema) -->
        <div class="app-nav-actions">
          <button id="btnTema" class="btn-icon" title="Alternar Tema">
            <i class="fas fa-moon"></i>
          </button>
          
          <!-- Botão Menu Mobile (com morphing MenuToggleIcon SVG) -->
          <button id="btnMenuMobile" class="btn-icon btn-menu-mobile md:hidden" aria-label="Menu" aria-expanded="false">
            <svg stroke-width="2.5" fill="none" stroke="currentColor" viewBox="0 0 32 32" stroke-linecap="round" stroke-linejoin="round" class="menu-toggle-svg" id="menuToggleIconSvg" style="transition-duration: 300ms;">
              <path class="menu-toggle-path-morph" style="transition-duration: 300ms;" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22" />
              <path d="M7 16 27 16" />
            </svg>
          </button>
        </div>

      </nav>
    </header>

    <!-- Menu Mobile (portal) -->
    <div id="mobileMenu" class="mobile-menu" style="display: none;" aria-hidden="true">
      <div class="mobile-menu-inner">
        <div class="mobile-menu-links">
          <button class="app-tab-mobile active" data-tab="contagem">Contagem Ativa</button>
          <button class="app-tab-mobile" data-tab="curvaABC">Curva ABC</button>
          <button class="app-tab-mobile" data-tab="monitoramento">Painel de Monitoramento</button>
        </div>
        <hr class="mobile-divider">
        <div class="mobile-menu-actions">
          <button id="btnTemaMovil" class="mobile-action-btn"><i class="fas fa-moon"></i> Alternar Tema</button>
        </div>
      </div>
    </div>

    <!-- ── Conteúdo Principal ── -->
    <main class="app-main">

      <!-- Filtros (visíveis mas compactos dentro do app) -->
      <section class="card filters-card app-filters">
        <div class="filtros-grid">
          <div class="form-group">
            <label for="uf2"><i class="fas fa-map-marker-alt"></i> Estado (UF)</label>
            <select id="uf2" class="form-control" disabled></select>
          </div>
          <div class="form-group">
            <label for="almox2"><i class="fas fa-warehouse"></i> Almoxarifado</label>
            <select id="almox2" class="form-control" disabled></select>
          </div>
          <div class="form-group" id="grupoBusca" style="visibility: hidden;">
            <label for="searchInput"><i class="fas fa-search"></i> Buscar Material</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Descrição, origem...">
          </div>
          <div class="form-group" id="grupoTipo" style="visibility: hidden;">
            <label for="tipoFilter"><i class="fas fa-tags"></i> Tipo de Material</label>
            <select id="tipoFilter" class="form-control">
              <option value="todos">Todos os materiais</option>
              <option value="cabos">Cabos / Fios</option>
              <option value="equipamentos">Equipamentos / Postes</option>
              <option value="conexoes">Conexões / Acessórios</option>
              <option value="seguranca">Segurança / Ferramentas</option>
              <option value="medicao">Medição / Proteção</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Conteúdo Dinâmico das Abas -->
      <div id="abaConteudo" class="tab-content-area">
        <!-- Renderizado dinamicamente via JS -->
      </div>

    </main>

  </div><!-- /appScreen -->

  <!-- ═══════════════════════════════════════════════════════════════════════
       MODAIS E UTILITÁRIOS (sempre presentes no DOM)
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Modal de Confirmação Final -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <i class="fas fa-check-circle modal-icon"></i>
        <h3>Finalizar Atualização</h3>
      </div>
      <div class="modal-body">
        <p>Você revisou todos os dados e está prestes a gravar a contagem física atual no sistema. Resumo da operação:</p>
        <div class="stats-grid">
          <div class="stat-box">
            <span id="modalResumoTotal">0</span>
            <small>Itens Auditados</small>
          </div>
          <div class="stat-box">
            <span id="modalResumoDivergencias">0</span>
            <small>Divergências</small>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btnCancelarSalvar" class="btn btn-secondary">Voltar</button>
        <button id="btnConfirmarSalvar" class="btn btn-primary">Confirmar e Gravar</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toastContainer"></div>

  <!-- Bibliotecas Externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- App -->
  <script type="module" src="js/aplicacao.js"></script>

</body>
</html>
